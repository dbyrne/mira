# Local horizon profile for the Jersey City balcony imaging spot.
#
# Source: Stellarium AR screenshots, 2026-05-06 (house_photos/1000017156.png
# through 1000017171.png). Read by visually projecting each tree/roof
# silhouette onto the overlaid az/alt grid.
#
# Precision: roughly ±5° azimuth, ±3° altitude. Good enough for
# "is this target behind an obstruction?" gating; not for pointing.
#
# Convention: azimuth in degrees, 0° = North, increasing clockwise
# (so 90° = East, 180° = South, 270° = West). Altitude in degrees from
# the horizon (0° = horizontal, 90° = zenith). The (az, alt) pairs
# describe the silhouette: a target at this azimuth must be ABOVE the
# given altitude to be observable. The scheduler interpolates linearly
# between adjacent points.
#
# Notable observable directions:
#   - East (90°-105°): clean to ~10°, good for rising targets
#   - South (180°-200°): clean to ~5°, surprise good window
#   - WSW gap (240°): cleanest non-east direction at +10°
#
# Notable blocked directions:
#   - NE/E (30°-60°): house + chimney peak, +40° to +45° minimum
#   - SW (210°-225°): tall tree, peak +40° around 220°

site: "Jersey City balcony"
captured_at: "2026-05-06"
points:
  # --- N quadrant: balcony rail + small obstruction ---
  - {az:   0, alt:  8}
  - {az:  15, alt:  8}
  - {az:  25, alt: 10}

  # --- NE: back of house, tall roof + chimney peak ---
