{% extends "base.html" %}
{% block title %}Run {{ run.run_id }} - AAVSO Anomaly Scout{% endblock %}
{% block content %}
<section class="card">
  <h2>{{ run.label }}</h2>
  <div hx-get="{{ url_for('run_status_partial', run_id=run.run_id) }}"
       hx-trigger="load, every 2s"
       hx-swap="innerHTML">
    {% include "run_status_partial.html" %}
  </div>
  <p style="margin-top: 1rem;">
    <a href="{{ url_for('index') }}" class="btn">← Home</a>
    <a href="{{ url_for('schedule') }}" class="btn">Open schedule</a>
  </p>
</section>
{% endblock %}
