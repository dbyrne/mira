<div class="run-status-block">
  <p>
    Status: <span class="status-{{ run.status }}">{{ run.status }}</span>
    {% if run.status == 'running' %}
    <progress value="{{ run.progress }}" max="1"></progress>
    {% endif %}
  </p>
  {% if run.error %}
  <p class="error"><strong>Error:</strong> {{ run.error }}</p>
  {% endif %}
  {% if run.result %}
  <details open>
    <summary>Result</summary>
    <pre>{{ run.result }}</pre>
  </details>
  {% endif %}
  <details {% if run.status == 'running' %}open{% endif %}>
    <summary>Log ({{ run.log_lines|length }} lines)</summary>
    <pre class="log" data-autoscroll="{{ 1 if run.status == 'running' else 0 }}">{% for line in run.log_lines %}{{ line }}
{% endfor %}</pre>
  </details>
</div>
<script>
(function(){
  document.querySelectorAll('pre.log[data-autoscroll="1"]').forEach(function(el){
    // Auto-scroll to bottom unless the user has scrolled away from the bottom.
    var atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 24;
    if (atBottom || el.dataset.firstRender === undefined) {
      el.scrollTop = el.scrollHeight;
      el.dataset.firstRender = '1';
    }
  });
})();
</script>
