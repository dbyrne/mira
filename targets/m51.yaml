# M51 Whirlpool Galaxy — session profile for `mira capture --session`.
#
# Multi-night project: keys off ra/dec for re-acquisition framing. Anchor
# coords are J2000 from SIMBAD. Use with:
#   mira capture --session targets/m51.yaml --dest data/captures/m51_<UTC>
#
# Any CLI flag overrides the value here. To skip plate-solve on a given
# night (e.g. clouds rolled in and you just want subs), pass
# `--no-platesolve-center` on the CLI.

ra: 202.4696
dec: 47.1952
# 60s validated 2026-05-19 via `mira tune`: HFR stable at ~2.0 px out to
# 90s (tracking holds), sky 400x read noise at 30s already (sky-limited),
# so per-sub SNR on faint galaxy structure scales as sqrt(exposure). 60s
# wins 1.41x per-sub SNR over 30s with ~140 subs/3hr — plenty for stack
# rejection.
exposure: 60
gain: 120
filter: LP
target_name: M51
platesolve_center: true
autofocus_every_min: 45
dither_arcsec: 30
